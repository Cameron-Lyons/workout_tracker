name: WorkoutTracker
options:
  minimumXcodeGenVersion: 2.44.1
settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: com.cam.workouttracker
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 1.0
    SWIFT_VERSION: 5.9
    TARGETED_DEVICE_FAMILY: 1
    IPHONEOS_DEPLOYMENT_TARGET: 17.0

configs:
  Debug: debug
  Release: release

targets:
  WorkoutTracker:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: WorkoutTracker
        excludes:
          - Info.plist
          - Resources/Assets.xcassets
    resources:
      - path: WorkoutTracker/Resources/Assets.xcassets
    dependencies:
      - sdk: Speech.framework
    settings:
      base:
        PRODUCT_NAME: WorkoutTracker
        INFOPLIST_FILE: WorkoutTracker/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor

schemes:
  WorkoutTracker:
    build:
      targets:
        WorkoutTracker: all
    run:
      config: Debug
    archive:
      config: Release
