name: WorkoutTracker
options:
  minimumXcodeGenVersion: 2.44.1
  xcodeVersion: "26.3"
settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: com.cam.workouttracker
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 1.0
    SWIFT_VERSION: 6.2
    TARGETED_DEVICE_FAMILY: 1
    IPHONEOS_DEPLOYMENT_TARGET: 26.2

configs:
  Debug: debug
  Release: release

targets:
  WorkoutTracker:
    type: application
    platform: iOS
    deploymentTarget: "26.2"
    sources:
      - path: WorkoutTracker
        excludes:
          - Info.plist
          - Resources
    resources:
      - path: WorkoutTracker/Resources
    settings:
      base:
        PRODUCT_NAME: WorkoutTracker
        INFOPLIST_FILE: WorkoutTracker/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor

  WorkoutTrackerTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "26.2"
    sources:
      - path: WorkoutTrackerTests
    dependencies:
      - target: WorkoutTracker
    settings:
      base:
        PRODUCT_NAME: WorkoutTrackerTests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/WorkoutTracker.app/WorkoutTracker"
        BUNDLE_LOADER: "$(TEST_HOST)"

  WorkoutTrackerUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "26.2"
    sources:
      - path: WorkoutTrackerUITests
    dependencies:
      - target: WorkoutTracker
    settings:
      base:
        PRODUCT_NAME: WorkoutTrackerUITests
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: WorkoutTracker

schemes:
  WorkoutTracker:
    build:
      targets:
        WorkoutTracker: all
    run:
      config: Debug
    test:
      config: Debug
      gatherCoverageData: true
      targets:
        - name: WorkoutTrackerTests
        - name: WorkoutTrackerUITests
    archive:
      config: Release
