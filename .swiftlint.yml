included:
  - WorkoutTracker
  - WorkoutTrackerTests
  - WorkoutTrackerUITests

excluded:
  - WorkoutTracker.xcodeproj
  - build
  - DerivedData

disabled_rules:
  - function_parameter_count
  - large_tuple
  - nesting
  - opening_brace
  - trailing_comma

opt_in_rules:
  - empty_count
  - first_where
  - flatmap_over_map_reduce
  - sorted_first_last

line_length:
  warning: 160
  error: 200
  ignores_comments: true
  ignores_urls: true

cyclomatic_complexity:
  warning: 20
  error: 30

function_body_length:
  warning: 200
  error: 300

type_body_length:
  warning: 1800
  error: 2200

file_length:
  warning: 2200
  error: 2600

reporter: "xcode"
