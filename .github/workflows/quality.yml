name: Quality

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  XCODE_PROJECT: WorkoutTracker.xcodeproj
  XCODE_SCHEME: WorkoutTracker
  XCODE_DESTINATION: platform=iOS Simulator,name=iPhone 17
  XCODE_COMPACT_DESTINATION: platform=iOS Simulator,name=iPhone 17e
  XCODE_IPAD_DESTINATION: platform=iOS Simulator,name=iPad Pro 13-inch (M5)

jobs:
  swiftlint:
    name: SwiftLint
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run SwiftLint
        run: swiftlint lint --config .swiftlint.yml

  swift-format:
    name: swift-format
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install swift-format
        run: brew install swift-format

      - name: Run swift-format
        run: swift-format lint --recursive --configuration .swift-format WorkoutTracker WorkoutTrackerTests WorkoutTrackerUITests

  build:
    name: Build
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build app
        run: xcodebuild build -project "$XCODE_PROJECT" -scheme "$XCODE_SCHEME" -destination "$XCODE_DESTINATION"

  unit-tests:
    name: Unit Tests
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Run unit tests
        run: xcodebuild test -project "$XCODE_PROJECT" -scheme "$XCODE_SCHEME" -destination "$XCODE_DESTINATION" -only-testing:WorkoutTrackerTests

  benchmark-tests:
    name: Benchmark Tests
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Run benchmark tests
        shell: bash
        run: |
          set -o pipefail
          xcodebuild test \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -destination "$XCODE_DESTINATION" \
            -parallel-testing-enabled NO \
            -resultBundlePath BenchmarkResults.xcresult \
            -only-testing:WorkoutTrackerTests/WorkoutBenchmarkTests \
            | tee benchmark-results.log

      - name: Append benchmark summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Benchmarks"
            echo '```text'
            grep -E '^BENCHMARK:|^benchmark\.' benchmark-results.log || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: |
            benchmark-results.log
            BenchmarkResults.xcresult

  ui-tests:
    name: UI Tests
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Run UI tests
        run: xcodebuild test -project "$XCODE_PROJECT" -scheme "$XCODE_SCHEME" -destination "$XCODE_DESTINATION" -parallel-testing-enabled NO -resultBundlePath UITestResults.xcresult -only-testing:WorkoutTrackerUITests

      - name: Upload UI test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-test-results
          path: UITestResults.xcresult

  ui-layout-smoke-compact:
    name: UI Layout Smoke (Compact)
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Run compact layout smoke tests
        run: xcodebuild test -project "$XCODE_PROJECT" -scheme "$XCODE_SCHEME" -destination "$XCODE_COMPACT_DESTINATION" -parallel-testing-enabled NO -resultBundlePath UILayoutCompactResults.xcresult -only-testing:WorkoutTrackerUITests/WorkoutTrackerUITests/testLayoutSmokeEmptyStatesAcrossDeviceClasses -only-testing:WorkoutTrackerUITests/WorkoutTrackerUITests/testLayoutSmokeSeededSessionFlowAcrossDeviceClasses

      - name: Upload compact layout artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-layout-compact-results
          path: UILayoutCompactResults.xcresult

  ui-layout-smoke-ipad:
    name: UI Layout Smoke (iPad)
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Run iPad layout smoke tests
        run: xcodebuild test -project "$XCODE_PROJECT" -scheme "$XCODE_SCHEME" -destination "$XCODE_IPAD_DESTINATION" -parallel-testing-enabled NO -resultBundlePath UILayoutIPadResults.xcresult -only-testing:WorkoutTrackerUITests/WorkoutTrackerUITests/testLayoutSmokeEmptyStatesAcrossDeviceClasses -only-testing:WorkoutTrackerUITests/WorkoutTrackerUITests/testLayoutSmokeSeededSessionFlowAcrossDeviceClasses

      - name: Upload iPad layout artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-layout-ipad-results
          path: UILayoutIPadResults.xcresult
